<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>Användarhantering</title>
</h:head>
<h:body>
    <h1>Hantera AppUsers</h1>

    <h:form id="userForm">
        <h:panelGrid columns="2">
            <h:outputLabel value="Användarnamn:" for="username" />
            <h:inputText id="username" value="#{userBean.username}" />

            <h:outputLabel value="Lösenord:" for="password" />
            <h:inputSecret id="password" value="#{userBean.password}" />

            <h:commandButton value="Spara användare" action="#{userBean.save}" >
                <f:ajax execute="@form" render="@form userList" />
            </h:commandButton>
        </h:panelGrid>
    </h:form>

    <hr />

    <h2>List över alla användare</h2>
    <h:dataTable id="userList" value="#{userBean.allUsers}" var="user">
        <h:column>
            <f:facet name="header">ID</f:facet>
            #{user.id}
        </h:column>
        <h:column>
            <f:facet name="header">Användarnamn</f:facet>
            #{user.username}
        </h:column>
    </h:dataTable>

</h:body>
</html>
